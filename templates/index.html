<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Insight Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #c9d1d9; overflow: hidden; }
        #vanta-bg { position: fixed; z-index: -1; top: 0; left: 0; width: 100%; height: 100%; }

        .container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 900px; max-height: 90vh; overflow-y: auto; padding: 40px;
            background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center;
        }
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { flex-grow: 1; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: rgba(1, 4, 9, 0.8); color: white; font-size: 16px; }
        button { padding: 12px 24px; background-color: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        button:hover { background-color: #2ea043; }
        .btn-outline { background-color: transparent; border: 1px solid #c9d1d9; }
        .btn-outline:hover { background-color: rgba(255,255,255,0.1); }
        
        .profile-img { width: 120px; height: 120px; border-radius: 50%; margin-top: 10px; border: 3px solid #30363d; display: none; }
        #bio { color: #8b949e; font-size: 14px; margin-bottom: 10px; }
        
        /* NEW: AI Summary Style */
        #ai-summary-container { display: none; background: rgba(88, 166, 255, 0.1); border-left: 4px solid #58a6ff; padding: 15px; text-align: left; margin-bottom: 20px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.5; color: #c9d1d9;}
        
        .badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(88, 166, 255, 0.1); border: 1px solid #58a6ff; color: #58a6ff; padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: help; }

        .stats-grid { display: none; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-box h3 { margin: 0; font-size: 20px; color: #fff; }
        .stat-box p { margin: 5px 0 0 0; font-size: 11px; color: #8b949e; text-transform: uppercase; font-weight: bold;}

        .heatmap-wrapper { display: none; text-align: left; margin-bottom: 25px; }
        .heatmap-wrapper h3 { font-size: 16px; margin-bottom: 10px; }
        .heatmap { display: flex; gap: 3px; overflow-x: auto; padding-bottom: 10px; }
        .heatmap::-webkit-scrollbar { height: 6px; }
        .heatmap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        .week { display: flex; flex-direction: column; gap: 3px; }
        .day { width: 11px; height: 11px; border-radius: 2px; background-color: #161b22; }

        .bottom-split { display: none; justify-content: space-between; gap: 20px; text-align: left; }
        .chart-container, .activity-section { width: 30%; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); max-height: 500px; overflow-y: auto; }
        .repo-section { width: 40%; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
        
        .repo-item { background: rgba(255, 255, 255, 0.03); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .repo-item:hover { background: rgba(255, 255, 255, 0.08); border-color: #58a6ff;}
        .repo-link { color: #58a6ff; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .repo-meta { color: #8b949e; font-size: 12px; }

        /* Modals and Overlays */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0d1117; padding: 30px; border-radius: 15px; width: 700px; max-height: 85vh; border: 1px solid #30363d; text-align: left; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #8b949e; font-size: 24px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .close-btn:hover { color: #ff7b72; }
        .modal-stats { display: flex; gap: 20px; margin: 15px 0; padding: 15px; background: #161b22; border-radius: 10px; flex-shrink: 0; }
        #modal-readme { background: #010409; padding: 20px; border-radius: 10px; border: 1px solid #30363d; overflow-y: auto; flex-grow: 1; margin-bottom: 15px; font-size: 14px; line-height: 1.6; }
        #modal-readme img { max-width: 100%; height: auto; }
        #modal-readme code { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; }
        #modal-readme pre { background: #161b22; padding: 10px; border-radius: 8px; overflow-x: auto; }

        /* Hacker Terminal */
        #terminal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; z-index: 9999; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .term-line { margin: 5px 0; font-size: 16px; opacity: 0; }
        .term-cursor { display: inline-block; width: 10px; height: 18px; background: #0f0; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* NEW: Time Machine / Wrapped Overlay */
        #wrapped-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #FF7B72, #D2A8FF); z-index: 9999; justify-content: center; align-items: center; text-align: center; color: white; flex-direction: column; }
        .wrapped-slide { font-size: 40px; font-weight: bold; opacity: 0; position: absolute; transition: opacity 1s ease-in-out; text-shadow: 0 4px 15px rgba(0,0,0,0.4); padding: 0 20px;}
        
        /* =========================================
           📱 MOBILE RESPONSIVENESS (MEDIA QUERIES)
           ========================================= */
        
        /* Tablets and smaller screens */
        @media (max-width: 950px) {
            .container {
                width: 95vw;
                height: 95vh;
                padding: 20px;
            }
            
            /* Stack the bottom three columns vertically */
            .bottom-split {
                flex-direction: column;
            }
            
            /* Make the charts, repos, and activity take full width */
            .chart-container, .repo-section, .activity-section {
                width: 100%;
                max-height: 400px; /* Keep them scrollable internally */
                box-sizing: border-box;
            }

            /* Adjust stats grid to 2 items per row */
            .stat-box {
                width: 46% !important; 
            }

            /* Shrink modal for smaller screens */
            .modal-content {
                width: 95%;
                padding: 20px;
                box-sizing: border-box;
            }
        }

        /* Mobile Phones */
        @media (max-width: 600px) {
            .header-actions {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            .search-box {
                flex-direction: column;
                width: 100%;
            }

            .search-box button {
                width: 100%;
            }

            /* Make stats stack 1 per row on very small screens */
            .stat-box {
                width: 100% !important; 
            }

            /* Stack the modal stats */
            .modal-stats {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            /* Make the Terminal font slightly smaller */
            #terminal-overlay {
                padding: 20px;
                font-size: 14px;
            }
            
            /* Make Wrapped text fit */
            .wrapped-slide {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <div class="container" id="dashboard-content">
        <h1 style="margin-top: 0; margin-bottom: 20px; text-align: left;">GitHub Insight</h1>
        
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="username" placeholder="Search a username..." onkeypress="if(event.key === 'Enter') analyzeProfile()">
                <button onclick="analyzeProfile()">Analyze</button>
                <button onclick="triggerTerminal()" id="term-btn" style="display:none; background-color: #000; border: 1px solid #0f0; color: #0f0;">💻 Terminal</button>
                <button onclick="triggerWrapped()" id="wrap-btn" class="btn-outline" style="display:none;">🕰️ Wrapped</button>
            </div>
        </div>

        <img id="avatar" class="profile-img" src="" alt="Profile">
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
            <h2 id="name" style="margin-bottom: 5px; margin-top: 10px;"></h2>
            <button id="copy-btn" onclick="copyShareLink()" style="display: none; padding: 5px 10px; font-size: 12px; background: #21262d; border: 1px solid #30363d; cursor: pointer;">🔗 Share Dashboard</button>
        </div>
        
        <p id="bio"></p>
        
        <div id="ai-summary-container"></div>

        <div id="orgs-container" style="display:flex; justify-content:center; gap:10px; margin-bottom: 10px; flex-wrap: wrap;"></div>
        <div id="badges-container" style="display:flex; justify-content:center; gap:10px; margin-bottom: 20px; flex-wrap: wrap;"></div>

        <div id="stats-grid" class="stats-grid">
            <div class="stat-box" style="width: 20%;"><h3 id="repos">-</h3><p>Repos</p></div>
            <div class="stat-box" style="width: 20%;"><h3 id="followers">-</h3><p>Follows</p></div>
            <div class="stat-box" style="width: 20%;"><h3 id="stars">-</h3><p>Stars</p></div>
            <div class="stat-box" style="width: 20%; border-color: #ff7b72;"><h3 id="current-streak" style="color:#ff7b72;">-</h3><p>Cur Streak</p></div>
            
            <div class="stat-box" style="width: 28%; border-color: #e3b341;"><h3 id="longest-streak" style="color:#e3b341;">-</h3><p>Max Streak</p></div>
            <div class="stat-box" style="width: 28%; border-color: #98fb98;"><h3 id="bug-hunter" style="color:#98fb98;">-</h3><p>Avg Issue Fix</p></div>
            <div class="stat-box" style="width: 30%; border-color: #79c0ff;"><h3 id="persona" style="color:#79c0ff;">-</h3><p>Persona</p></div>
        </div>

        <div id="heatmap-section" class="heatmap-wrapper">
            <h3 id="heatmap-title">Contribution Activity</h3>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <div id="bottom-split" class="bottom-split">
            <div class="chart-container">
                <h3 style="margin-top:0; font-size:16px;">Domain Expertise</h3>
                <canvas id="radarChart" style="max-height: 180px; margin-bottom: 20px;"></canvas>
                <h3 style="margin-top:0; font-size:16px;">Top Languages</h3>
                <canvas id="langChart" style="max-height: 160px; margin-bottom: 20px;"></canvas>
                <h3 style="margin-top:0; font-size:16px;">Most Starred</h3>
                <canvas id="starChart" style="max-height: 160px; margin-bottom: 20px;"></canvas>
                <h3 style="margin-top:0; font-size:16px;">Work Habits (90 Days)</h3>
                <canvas id="punchChart" style="max-height: 180px;"></canvas>
            </div>
            
            <div class="repo-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <h3 style="margin:0; font-size:16px;">Repositories</h3>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="repo-search" placeholder="Filter..." oninput="renderRepos()" style="padding: 6px; font-size:13px; width: 90px; margin:0;">
                        <select id="repo-sort" onchange="renderRepos()" style="padding: 6px; font-size:13px; background: rgba(1, 4, 9, 0.8); color: white; border: 1px solid #30363d; border-radius: 6px; outline: none;">
                            <option value="recent">Recent</option>
                            <option value="stars">Stars</option>
                        </select>
                    </div>
                </div>
                <div id="repo-list"></div>
            </div>

            <div class="activity-section">
                <h3 style="margin-top:0; font-size:16px;">Live Activity</h3>
                <div id="activity-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="terminal-overlay">
        <button class="exit-term-btn" onclick="document.getElementById('terminal-overlay').style.display='none'; document.getElementById('dashboard-content').style.display='block';">[ EXIT ]</button>
        <div id="terminal-output"></div><div class="term-cursor"></div>
    </div>

    <div id="wrapped-overlay">
        <button class="exit-term-btn" style="border-color: white; color: white;" onclick="document.getElementById('wrapped-overlay').style.display='none'; document.getElementById('dashboard-content').style.display='block';">[ SKIP ]</button>
        <div id="wrapped-content" style="position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;"></div>
    </div>

    <div id="repoModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <a href="#" class="close-btn" onclick="closeModal(event)">&times;</a>
            <h2 id="modal-title" style="color: #58a6ff; margin-top: 0; margin-bottom: 5px;"></h2>
            <p id="modal-desc" style="color: #8b949e; line-height: 1.5; margin-top: 0;"></p>
            <div class="modal-stats">
                <div><span style="color:#e3b341;">⭐ Stars:</span> <span id="modal-stars" style="color:white; font-weight:bold;"></span></div>
                <div><span style="color:#79c0ff;">🍴 Forks:</span> <span id="modal-forks" style="color:white; font-weight:bold;"></span></div>
                <div><span style="color:#ff7b72;">🐛 Issues:</span> <span id="modal-issues" style="color:white; font-weight:bold;"></span></div>
            </div>
            <h3 style="font-size: 14px; margin-top: 0; color: #c9d1d9;">README.md</h3>
            <div id="modal-readme">Loading document...</div>
            <button id="modal-link" style="width: 100%; flex-shrink: 0;" onclick="">Open Source in GitHub</button>
        </div>
    </div>

    <script>
        VANTA.NET({ el: "#vanta-bg", mouseControls: true, touchControls: true, color: 0x58a6ff, backgroundColor: 0x010409, points: 15.0, maxDistance: 25.0, spacing: 20.0 });
        
        let langChartInstance = null; let starChartInstance = null; let radarChartInstance = null; let punchChartInstance = null;
        let globalRepoData = []; let wrappedData = {}; // Stores data for Time Machine

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('user')) { document.getElementById('username').value = params.get('user'); analyzeProfile(); }
        };

        async function analyzeProfile() {
            const username = document.getElementById('username').value;
            if(!username) return;
            const btn = document.querySelector('button'); btn.innerText = "Fetching..."; btn.disabled = true;
            window.history.pushState({}, '', '?user=' + username);

            try {
                const response = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username }) });
                const data = await response.json();

                if (response.ok) {
                    globalRepoData = data.recent_repos; 
                    wrappedData = { timeline: data.profile.timeline, name: data.profile.name, topLang: Object.keys(data.languages)[0] || 'Code' };

                    document.getElementById('avatar').style.display = "inline";
                    document.getElementById('stats-grid').style.display = "flex";
                    document.getElementById('heatmap-section').style.display = "block";
                    document.getElementById('bottom-split').style.display = "flex";
                    document.getElementById('copy-btn').style.display = "inline-block";
                    document.getElementById('term-btn').style.display = "inline-block";
                    document.getElementById('wrap-btn').style.display = "inline-block";
                    
                    document.getElementById('ai-summary-container').style.display = "block";
                    document.getElementById('ai-summary-container').innerHTML = data.profile.ai_summary;

                    document.getElementById('avatar').src = data.profile.avatar;
                    document.getElementById('name').innerText = data.profile.name;
                    document.getElementById('bio').innerText = data.profile.bio;
                    document.getElementById('repos').innerText = data.profile.repos;
                    document.getElementById('followers').innerText = data.profile.followers;
                    document.getElementById('stars').innerText = data.profile.total_stars;
                    document.getElementById('current-streak').innerText = data.profile.current_streak + ' 🔥';
                    document.getElementById('longest-streak').innerText = data.profile.longest_streak + ' 🏆';
                    document.getElementById('bug-hunter').innerText = data.profile.bug_hunter;
                    document.getElementById('persona').innerText = data.profile.persona;

                    const orgsContainer = document.getElementById('orgs-container'); orgsContainer.innerHTML = '';
                    if (data.organizations) data.organizations.forEach(org => orgsContainer.innerHTML += `<img src="${org.avatar}" title="${org.login}" style="width: 32px; height: 32px; border-radius: 6px; border: 1px solid #30363d;">`);

                    const badgesContainer = document.getElementById('badges-container'); badgesContainer.innerHTML = '';
                    if (data.badges) data.badges.forEach(b => badgesContainer.innerHTML += `<span class="badge" title="${b.desc}">${b.icon} ${b.title}</span>`);

                    document.getElementById('repo-search').value = ''; document.getElementById('repo-sort').value = 'recent'; renderRepos();

                    const activityList = document.getElementById('activity-list'); activityList.innerHTML = '';
                    if (data.recent_activity && data.recent_activity.length > 0) {
                        data.recent_activity.forEach(activity => {
                            activityList.innerHTML += `
                                <div style="font-size: 13px; line-height: 1.4; border-left: 2px solid #30363d; padding-left: 10px; position: relative;">
                                    <span style="position: absolute; left: -10px; top: -2px; background: #0d1117; font-size: 12px;">${activity.icon}</span>
                                    <span style="color: #8b949e;">${activity.date}</span><br>
                                    <span style="color: #c9d1d9;">${activity.action}</span> <a href="https://github.com/${activity.full_repo}" target="_blank" style="color: #58a6ff; text-decoration: none; font-weight: bold;">${activity.repo}</a>
                                </div>`;
                        });
                    } else activityList.innerHTML = '<p style="color:#8b949e;">No recent public activity.</p>';

                    Chart.defaults.color = '#8b949e';
                    if (langChartInstance) langChartInstance.destroy();
                    langChartInstance = new Chart(document.getElementById('langChart').getContext('2d'), { type: 'doughnut', data: { labels: Object.keys(data.languages), datasets: [{ data: Object.values(data.languages), backgroundColor: ['#ff7b72', '#79c0ff', '#d2a8ff', '#a5d6ff', '#f0e68c', '#98fb98', '#ff9900'], borderWidth: 0 }] }, options: { plugins: { legend: { display: true, position: 'right', labels: { boxWidth: 10 } } }, cutout: '65%' } });

                    if (starChartInstance) starChartInstance.destroy();
                    const topStarred = [...data.recent_repos].sort((a, b) => b.stars - a.stars).slice(0, 5);
                    starChartInstance = new Chart(document.getElementById('starChart').getContext('2d'), { type: 'bar', data: { labels: topStarred.map(r => r.name.length > 10 ? r.name.substring(0,10) + '...' : r.name), datasets: [{ label: 'Stars', data: topStarred.map(r => r.stars), backgroundColor: '#e3b341', borderRadius: 4 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } } });

                    if (radarChartInstance) radarChartInstance.destroy();
                    const top6 = Object.entries(data.languages).sort((a,b) => b[1]-a[1]).slice(0,6);
                    radarChartInstance = new Chart(document.getElementById('radarChart').getContext('2d'), { type: 'radar', data: { labels: top6.map(l => l[0]), datasets: [{ label: 'Projects', data: top6.map(l => l[1]), backgroundColor: 'rgba(88, 166, 255, 0.4)', borderColor: '#58a6ff', pointBackgroundColor: '#fff', borderWidth: 1 }] }, options: { scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#c9d1d9', font: {size: 10} }, ticks: { display: false } } }, plugins: { legend: { display: false } } } });

                    if (punchChartInstance) punchChartInstance.destroy();
                    const punchMap = {}; data.punchcard.forEach(p => { punchMap[`${p.x},${p.y}`] = (punchMap[`${p.x},${p.y}`] || 0) + 1; });
                    const bubbleData = Object.keys(punchMap).map(key => { const [x, y] = key.split(',').map(Number); return { x: x, y: y, r: Math.min(punchMap[key] * 3, 15) }; });
                    punchChartInstance = new Chart(document.getElementById('punchChart').getContext('2d'), { type: 'bubble', data: { datasets: [{ label: 'Commits', data: bubbleData, backgroundColor: 'rgba(88, 166, 255, 0.6)', borderColor: '#58a6ff' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { min: -0.5, max: 6.5, reverse: true, ticks: { callback: val => ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][val], color: '#8b949e', font: {size: 10} }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { min: -1, max: 24, ticks: { callback: val => val+':00', stepSize: 4, color: '#8b949e', font: {size: 10} }, grid: { display: false } } } } });

                    const heatmapEl = document.getElementById('heatmap'); heatmapEl.innerHTML = ''; 
                    if (data.heatmap) {
                        document.getElementById('heatmap-title').innerText = `Contributions (${data.heatmap.totalContributions} in the last year)`;
                        data.heatmap.weeks.forEach(week => {
                            const weekDiv = document.createElement('div'); weekDiv.className = 'week';
                            week.contributionDays.forEach(day => {
                                const dayDiv = document.createElement('div'); dayDiv.className = 'day'; dayDiv.style.backgroundColor = day.color; dayDiv.title = `${day.contributionCount} on ${day.date}`; weekDiv.appendChild(dayDiv);
                            });
                            heatmapEl.appendChild(weekDiv);
                        });
                        heatmapEl.scrollLeft = heatmapEl.scrollWidth;
                    }
                } else alert(data.error);
            } catch (error) { alert("Could not connect to server."); }
            btn.innerText = "Analyze"; btn.disabled = false;
        }

        function renderRepos() {
            const searchTerm = document.getElementById('repo-search').value.toLowerCase();
            const sortBy = document.getElementById('repo-sort').value;
            const repoList = document.getElementById('repo-list');

            let filtered = globalRepoData.filter(r => r.name.toLowerCase().includes(searchTerm) || r.lang.toLowerCase().includes(searchTerm));
            if (sortBy === 'stars') filtered.sort((a, b) => b.stars - a.stars);
            else if (sortBy === 'recent') filtered.sort((a, b) => new Date(b.updated) - new Date(a.updated));

            repoList.innerHTML = '';
            if (filtered.length === 0) { repoList.innerHTML = '<p style="color:#8b949e; text-align:center;">No repositories found.</p>'; return; }

            filtered.forEach(repo => {
                repoList.innerHTML += `<div class="repo-item" onclick="openModal(${globalRepoData.indexOf(repo)})"><div><div class="repo-link">${repo.name}</div><div class="repo-meta">💻 ${repo.lang}</div></div><div class="repo-meta" style="color: #e3b341; font-weight: bold;">⭐ ${repo.stars}</div></div>`;
            });
        }

        async function openModal(index) {
            const repo = globalRepoData[index];
            document.getElementById('modal-title').innerText = repo.name; document.getElementById('modal-desc').innerText = repo.desc; document.getElementById('modal-stars').innerText = repo.stars; document.getElementById('modal-forks').innerText = repo.forks; document.getElementById('modal-issues').innerText = repo.issues; document.getElementById('modal-link').onclick = () => window.open(repo.url, '_blank');
            document.getElementById('repoModal').style.display = 'flex';
            
            const readmeDiv = document.getElementById('modal-readme'); readmeDiv.innerHTML = '<p style="color:#58a6ff;">Fetching documentation...</p>';
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${repo.full_name}/${repo.default_branch}/README.md`);
                if (res.ok) { const text = await res.text(); readmeDiv.innerHTML = marked.parse(text); } 
                else readmeDiv.innerHTML = '<p style="color:#8b949e;">No README available.</p>';
            } catch (err) { readmeDiv.innerHTML = '<p style="color:#ff7b72;">Error loading documentation.</p>'; }
        }

        function closeModal(event) { event.preventDefault(); document.getElementById('repoModal').style.display = 'none'; }
        function copyShareLink() { navigator.clipboard.writeText(window.location.href).then(() => { const btn = document.getElementById('copy-btn'); btn.innerText = "✅ Link Copied!"; setTimeout(() => btn.innerText = "🔗 Share Dashboard", 2000); }); }

        function triggerTerminal() {
            document.getElementById('dashboard-content').style.display = 'none'; document.getElementById('terminal-overlay').style.display = 'block';
            const output = document.getElementById('terminal-output'); output.innerHTML = '';
            const lines = [`> INITIALIZING V2... [OK]`, `> TARGET ACQUIRED: ${document.getElementById('name').innerText.toUpperCase()}`, `> IDENTIFIED PERSONA: ${document.getElementById('persona').innerText}`, `> REPOSITORIES: ${document.getElementById('repos').innerText}`, `> TOTAL STAR POWER: ${document.getElementById('stars').innerText}`, `> AWAITING COMMAND_`];
            let i = 0; function typeLine() { if (i < lines.length) { const l = document.createElement('div'); l.className = 'term-line'; l.innerText = lines[i]; output.appendChild(l); setTimeout(() => l.style.opacity = 1, 50); i++; setTimeout(typeLine, Math.random() * 300 + 200); } } typeLine();
        }

        function triggerWrapped() {
            document.getElementById('dashboard-content').style.display = 'none'; document.getElementById('wrapped-overlay').style.display = 'flex';
            const wrapContent = document.getElementById('wrapped-content'); wrapContent.innerHTML = '';
            
            const years = Object.keys(wrappedData.timeline).sort();
            const activeYear = years.length > 0 ? years[years.length-1] : "Recently";
            const reposThatYear = wrappedData.timeline[activeYear] || 0;

            const slides = [
                `Ready to look back, ${wrappedData.name.split(' ')[0]}? 🎧`,
                `You've been building the future.`,
                `In ${activeYear} alone, you started ${reposThatYear} new projects.`,
                `And you poured your soul into ${wrappedData.topLang}.`,
                `Keep building. 🚀`
            ];

            let i = 0;
            function showSlide() {
                if(i < slides.length) {
                    wrapContent.innerHTML = `<div class="wrapped-slide">${slides[i]}</div>`;
                    const slideEl = wrapContent.querySelector('.wrapped-slide');
                    setTimeout(() => slideEl.style.opacity = 1, 100);
                    setTimeout(() => { slideEl.style.opacity = 0; i++; setTimeout(showSlide, 1000); }, 3500);
                } else {
                    document.getElementById('wrapped-overlay').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';
                }
            }
            showSlide();
        }
    </script>
</body>
</html>
